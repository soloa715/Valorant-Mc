# ValorantMC Messages
prefix: "&b[&cVAL&b]&r "

game:
  join: "&aYou joined the game!"
  leave: "&cYou left the game."
  already-in-game: "&cYou are already in a game!"
  not-in-game: "&cYou are not in a game!"
  game-full: "&cThe game is full!"
  game-started: "&aGame started!"
