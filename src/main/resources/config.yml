# ValorantMC Configuration

# Game settings
game:
  max-rounds: 25         # First to 13 wins
  buy-phase-duration: 30 # seconds
  round-duration: 100    # seconds
  spike-timer: 45        # seconds
  defuse-time: 7         # seconds
  plant-time: 4          # seconds
  respawn-on-new-round: true
  starting-credits: 800
  round-loss-bonus: 1900 # Base loss bonus
  round-win-bonus: 3000
  kill-bonus: 200
  spike-plant-bonus: 300
  spike-defuse-bonus: 300
  max-credits: 9000

# Team sizes
teams:
  max-size: 5

# Weapon settings
weapons:
  headshot-multiplier: 2.5
  enable-spray-patterns: true
  enable-recoil: true
  bullet-spread: true

# Map settings
maps:
  auto-load: true
  maps-folder: "maps"
  default-world: "world"
  arena-y: 100           # Y coordinate where auto-generated arenas are built

# Display
display:
  scoreboard: true
  bossbar: true
  actionbar: true
  chat-prefix: "&b[&cVAL&b]&r"

# Sound
sounds:
  enabled: true
  spike-beep-interval: 3  # seconds between spike beeps

# Resource pack (set your resource pack URL here)
resource-pack:
  enabled: false
  url: ""
  hash: ""
  required: false
  message: "Install the ValorantMC resource pack for custom weapon textures!"
