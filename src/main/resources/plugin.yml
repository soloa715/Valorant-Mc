name: ValorantMC
version: ${project.version}
main: com.valorantmc.ValorantMC
api-version: 1.21
description: Full Valorant experience inside Minecraft
authors: [ValorantMC Team]
website: https://github.com/valorantmc

commands:
  valorant:
    description: Main ValorantMC command
    aliases: [val, v]
    usage: /valorant <subcommand>
  vshop:
    description: Open the buy menu
    aliases: [shop, buy]
    usage: /vshop
  vagent:
    description: Select your agent
    aliases: [agent]
    usage: /vagent
  vskip:
    description: Vote to skip the buy phase
    usage: /vskip
  vstats:
    description: View your stats
    usage: /vstats [player]
  vreload:
    description: Reload the held weapon
    usage: /vreload
  vdropspike:
    description: Drop the spike
    usage: /vdropspike
  vwalk:
    description: Toggle walk/run
    usage: /vwalk
  vuse:
    description: Use an ability (C/Q/E/X)
    usage: /vuse <slot>
  vskin:
    description: Open the skin collection GUI
    usage: /vskin
  vplay:
    description: Open the lobby GUI
    aliases: [play, lobby]
    usage: /vplay
  vadmin:
    description: Open the admin panel GUI
    aliases: [admin, ap]
    usage: /vadmin
    permission: valorantmc.admin
  vmapsetup:
    description: In-game map setup wizard for server hosters
    aliases: [mapsetup, vmap]
    usage: /vmapsetup <create|addspawn|addsite|setworld|save|list|validate|tp|wand>
    permission: valorantmc.admin

permissions:
  valorantmc.admin:
    description: Full admin access
    default: op
  valorantmc.play:
    description: Play the game
    default: true
  valorantmc.shop:
    description: Use the buy menu
    default: true
