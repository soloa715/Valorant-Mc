# ValorantMC Configuration

# Game settings
game:
  max-rounds: 25         # First to 13 wins
  buy-phase-duration: 30 # seconds
  round-duration: 100    # seconds
  spike-timer: 45        # seconds
  defuse-time: 7         # seconds
  plant-time: 4          # seconds
  respawn-on-new-round: true
  starting-credits: 800
  round-loss-bonus: 1900 # Base loss bonus
  round-win-bonus: 3000
  kill-bonus: 200
  spike-plant-bonus: 300
  spike-defuse-bonus: 300
  max-credits: 9000

# Team sizes
teams:
  max-size: 5

# Weapon settings
weapons:
  headshot-multiplier: 2.5
  enable-spray-patterns: true
  enable-recoil: true
  bullet-spread: true

# Map settings
maps:
  auto-load: true
  maps-folder: "maps"
  default-world: "world"
  arena-y: 100           # Y coordinate where auto-generated arenas are built
  # Path to the modding/maps folder (relative to server root).
  # Default "../modding/maps" works when the server is in a "run/" subdirectory
  # of the Valorant-Mc project folder. Adjust if your layout differs.
  modding-dir: "../modding/maps"
  # Map rotation order for Quick Play / auto-match
  rotation:
    - ascent
    - haven
    - pearl
    - lotus
    - sunset
    - fracture
    - abyss

# Display
display:
  scoreboard: true
  bossbar: true
  actionbar: true
  chat-prefix: "&b[&cVAL&b]&r"

# Sound
sounds:
  enabled: true
  spike-beep-interval: 3  # seconds between spike beeps

# Resource pack
# After generating the pack (run: java BuildAssets.java in the modding/ folder),
# host modding/dist/ValorantMC-ResourcePack.zip somewhere publicly accessible,
# then paste the direct-download URL and its SHA-1 hash here and set enabled: true.
#
# Quick free hosting options:
#   - GitHub Releases: upload the zip as a release asset, use the raw download URL
#   - Dropbox: upload and change ?dl=0 to ?dl=1 in the share link
#   - self-host with nginx / any web server
#
# Get SHA-1:  certutil -hashfile ValorantMC-ResourcePack.zip SHA1  (Windows)
#             sha1sum ValorantMC-ResourcePack.zip                  (Linux/Mac)
resource-pack:
  enabled: false
  url: ""
  hash: ""
  required: false
  message: "&aInstall the ValorantMC resource pack for custom weapon models and skins!"

# Economy / VP
economy:
  # Starting Valorant Points for new players (cosmetics currency)
  starting-vp: 10000
  # Set to true to give all skins for free (no VP cost) — useful for test servers
  free-skins: true

# Permissions
# valorantmc.admin  — admin commands (/valorant forcestart, kick, pause, etc.)
# valorantmc.play   — join games, use /valorant join
# valorantmc.shop   — access in-game shop
permissions:
  admin-bypass: true    # ops bypass all permission checks
